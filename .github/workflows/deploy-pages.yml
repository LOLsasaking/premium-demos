name: Deploy BuildWise to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['buildwise/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: buildwise/package-lock.json
      - run: npm ci
        working-directory: buildwise
      - run: npm run build
        working-directory: buildwise
        env:
          VITE_BASE: /premium-demos/
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: buildwise/dist
      - id: deployment
        uses: actions/deploy-pages@v4

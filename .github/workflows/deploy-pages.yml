name: Deploy BuildWise to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['buildwise/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: buildwise/package-lock.json
      - run: npm ci
        working-directory: buildwise
      - run: npm run build
        working-directory: buildwise
        env:
          VITE_BASE: /premium-demos/
      # Publish dist/ to the gh-pages branch (Pages source: deploy from branch).
      - name: Push to gh-pages
        run: |
          cd buildwise/dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy BuildWise AI (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
